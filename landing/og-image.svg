<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="100%" stop-color="#0a0a14"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0.2" cy="0.3" r="0.4">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.85" cy="0.8" r="0.45">
      <stop offset="0%" stop-color="#0e7490" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0e7490" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="title-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#b8b8c0"/>
    </linearGradient>
    <linearGradient id="accent-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
  </defs>

  <!-- BACKGROUND -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Soft grid hint -->
  <g opacity="0.05">
    <line x1="0" y1="155" x2="1200" y2="155" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="315" x2="1200" y2="315" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="475" x2="1200" y2="475" stroke="#fff" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="900" y1="0" x2="900" y2="630" stroke="#fff" stroke-width="1"/>
  </g>

  <!-- LOGO + BRAND -->
  <g transform="translate(80, 80)">
    <rect width="56" height="56" rx="14" fill="#0a0a0a" stroke="#06b6d4" stroke-width="1.5" stroke-opacity="0.6"/>
    <text x="28" y="38" font-family="-apple-system, Segoe UI, sans-serif" font-weight="800" font-size="20" fill="#06b6d4" text-anchor="middle">FC</text>
    <text x="74" y="32" font-family="-apple-system, Segoe UI, sans-serif" font-weight="800" font-size="26" fill="#f5f5f7" letter-spacing="-0.6">FreeCaption</text>
    <text x="74" y="50" font-family="-apple-system, Segoe UI, sans-serif" font-weight="600" font-size="11" fill="#06b6d4" letter-spacing="2" text-transform="uppercase">AÇIK KAYNAK · v1.0</text>
  </g>

  <!-- BADGE -->
  <g transform="translate(80, 195)">
    <rect width="280" height="38" rx="19" fill="rgba(6,182,212,0.12)" stroke="#06b6d4" stroke-opacity="0.3" stroke-width="1"/>
    <circle cx="22" cy="19" r="4" fill="#06b6d4"/>
    <text x="36" y="24" font-family="-apple-system, Segoe UI, sans-serif" font-weight="600" font-size="13" fill="#22d3ee">Premiere Pro · Whisper AI · 99 dil</text>
  </g>

  <!-- TITLE -->
  <g transform="translate(80, 280)">
    <text font-family="-apple-system, Segoe UI, sans-serif" font-weight="800" font-size="76" letter-spacing="-2">
      <tspan x="0" y="0" fill="url(#title-grad)">Türkçe altyazı,</tspan>
      <tspan x="0" y="88" fill="url(#accent-grad)">artık ücretsiz.</tspan>
    </text>
  </g>

  <!-- SUBTITLE -->
  <text x="80" y="510" font-family="-apple-system, Segoe UI, sans-serif" font-weight="500" font-size="22" fill="#a8a8b0" letter-spacing="-0.2">
    Premiere Pro için açık kaynak, yerel, sınırsız Whisper eklentisi.
  </text>

  <!-- BOTTOM BAR: URL + features -->
  <g transform="translate(80, 565)">
    <text font-family="-apple-system, Segoe UI, sans-serif" font-weight="700" font-size="16" fill="#06b6d4" letter-spacing="0.5">
      github.com/ScamEmre/FreeCaption
    </text>
  </g>

  <!-- DECORATIVE: caption mockup right side -->
  <g transform="translate(700, 220)" opacity="0.95">
    <!-- Frame -->
    <rect width="420" height="240" rx="14" fill="#0a0a0a" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <!-- Inner dark area mimicking video -->
    <rect x="14" y="14" width="392" height="180" rx="8" fill="#141418"/>
    <!-- Timeline strip -->
    <rect x="14" y="204" width="392" height="22" rx="4" fill="#1c1c22"/>
    <rect x="14" y="204" width="180" height="22" rx="4" fill="rgba(6,182,212,0.18)"/>
    <!-- Caption boxes (mocked subtitles) -->
    <g transform="translate(34, 110)">
      <rect width="220" height="32" rx="6" fill="rgba(0,0,0,0.5)"/>
      <text x="110" y="22" font-family="-apple-system, Segoe UI, sans-serif" font-weight="700" font-size="14" fill="#fff" text-anchor="middle">İlk izlenim hep önemlidir,</text>
    </g>
    <g transform="translate(34, 148)">
      <rect width="200" height="32" rx="6" fill="rgba(6,182,212,0.85)"/>
      <text x="100" y="22" font-family="-apple-system, Segoe UI, sans-serif" font-weight="700" font-size="14" fill="#001318" text-anchor="middle">deneyim ve teknoloji ile</text>
    </g>
    <!-- Cursor on timeline -->
    <line x1="194" y1="200" x2="194" y2="230" stroke="#22d3ee" stroke-width="2"/>
    <circle cx="194" cy="200" r="3" fill="#22d3ee"/>
  </g>
</svg>
