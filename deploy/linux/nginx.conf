# FreeCaption — Nginx reverse proxy + rate limit
# Konum: /etc/nginx/sites-available/freecaption
#
# HTTPS sonra certbot --nginx ile otomatik eklenir.

# Rate limit zonu: IP basina 1 saniyede 2 istek, burst 10
limit_req_zone $binary_remote_addr zone=fc_api:10m rate=2r/s;

# Upload zonu: yavas yukleme/long-poll'lara karsi
limit_req_zone $binary_remote_addr zone=fc_upload:10m rate=10r/m;

server {
    listen 80;
    listen [::]:80;
    server_name _;  # certbot ile domain set edilince burayi degistir

    # Body limit (Whisper icin buyuk video uploads)
    client_max_body_size 500M;
    client_body_timeout 600s;
    client_header_timeout 60s;

    # Loglar
    access_log /var/log/nginx/freecaption-access.log;
    error_log  /var/log/nginx/freecaption-error.log warn;

    # Gzip (text response'lar icin)
    gzip on;
    gzip_types text/plain application/json application/x-subrip;
    gzip_min_length 256;

    # Static frontend (varsa, /opt/freecaption/frontend)
    location / {
        proxy_pass http://127.0.0.1:7860;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    # API rate limit (genel)
    location /api/ {
        limit_req zone=fc_api burst=10 nodelay;

        proxy_pass http://127.0.0.1:7860;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
    }

    # Upload daha siki: IP basina 10 req/dakika
    location = /api/upload {
        limit_req zone=fc_upload burst=3 nodelay;
        client_max_body_size 500M;

        proxy_pass http://127.0.0.1:7860;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_request_buffering off;  # streaming upload
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # SSE stream endpoint'i icin buffering kapat
    location ~ ^/api/stream/ {
        proxy_pass http://127.0.0.1:7860;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    # Health (rate limit muaf)
    location = /api/health {
        proxy_pass http://127.0.0.1:7860;
        access_log off;
    }
}
